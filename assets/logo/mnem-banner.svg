<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 435" role="img" aria-label="mnem banner">
  <title>mnem - Git for AI Agent Knowledge</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#b4e6d7"/>
      <stop offset="100%" stop-color="#3cc3a0"/>
    </linearGradient>
    <linearGradient id="rustNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#e07a3a"/>
      <stop offset="100%" stop-color="#c25620"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="435" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="435" fill="url(#bg)"/>
    <rect width="1200" height="435" fill="url(#grid)"/>

    <!-- Diamond logo, centered. Same construction as assets/logo/mnem-logo.svg
         (slate edges, teal accent stroke at 0.28 opacity, rust gradient nodes).
         Scale 1.1 -> 282px visible. (1200 - 282) / 2 = 459 px x offset. -->
    <g transform="translate(459,25) scale(1.1)">
      <g stroke="#1f2a36" stroke-width="20" stroke-linecap="butt" fill="none">
        <line x1="128" y1="48"  x2="48"  y2="128"/>
        <line x1="48"  y1="128" x2="128" y2="208"/>
        <line x1="128" y1="208" x2="208" y2="128"/>
        <line x1="208" y1="128" x2="128" y2="48"/>
      </g>
      <g stroke="rgba(0,200,150,0.55)" stroke-width="1.4" fill="none">
        <line x1="128" y1="48"  x2="48"  y2="128"/>
        <line x1="48"  y1="128" x2="128" y2="208"/>
        <line x1="128" y1="208" x2="208" y2="128"/>
        <line x1="208" y1="128" x2="128" y2="48"/>
      </g>
      <g fill="url(#rustNode)">
        <polygon points="128,34  142,48  128,62  114,48"/>
        <polygon points="48,114  62,128  48,142  34,128"/>
        <polygon points="208,114 222,128 208,142 194,128"/>
        <polygon points="128,194 142,208 128,222 114,208"/>
      </g>
    </g>

    <!-- Wordmark. Baseline y=402; visual bottom ~y=410. Bottom pad 25 mirrors top. -->
    <text x="600" y="402" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="110" font-weight="900" letter-spacing="-5" fill="#0f2520">mnem</text>
  </g>

  <!-- Aesthetic inner frame: subtle white hairline just inside the rounded
       edge, gives the card a soft highlight rim without competing with the
       glyph or wordmark. Drawn outside the clip so it sits exactly on the
       boundary. -->
  <rect x="0.5" y="0.5" width="1199" height="434" rx="27.5" ry="27.5"
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
</svg>
