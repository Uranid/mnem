name: release

# Push an annotated tag (e.g. v0.1.5) to cut a new release.
# The tag is the single source of truth for the version number.
# The workflow:
#   1. runs the full test matrix on Linux + macOS + Windows,
#   2. derives the version directly from the pushed tag,
#   3. runs scripts/bump-version.py in each build/publish job so
#      Cargo.toml, Cargo.lock, and all non-Rust package manifests
#      reflect the tag version before building or publishing,
#   4. publishes a GitHub release with auto-generated notes.
#
# Pre-releases (any version containing a hyphen, e.g. 0.1.0-alpha.1) are
# marked as GitHub "pre-release" automatically.
#
# To release: git tag -a v0.1.5 -m "mnem v0.1.5" && git push origin v0.1.5
#
# -----------------------------------------------------------------------------
# Distribution architecture (post-refactor; commit 9f824a7):
#
# pip:
#   - Per-platform wheels are built inside each `binaries` matrix arm.
#     The wheel build is driven by `MNEM_CLI_PLAT_TAG` (e.g. `win_amd64`,
#     `macosx_11_0_arm64`, `manylinux_2_17_x86_64.manylinux2014_x86_64`,
#     `manylinux_2_17_aarch64.manylinux2014_aarch64`). The native binary
#     and onnxruntime get staged into `mnem_cli/_vendor/{bin,lib}/` before
#     `python -m build --wheel`. Source tree only has `.gitkeep`.
#   - `publish-pypi` downloads all 4 per-triple wheel artifacts plus the
#     sdist (no embedded binary; serves as helpful-error fallback) and
#     publishes via the PyPI Trusted Publisher (OIDC).
#
# npm:
#   - Umbrella package `npm-packages/mnem-cli/` declares all 4 native
#     sub-packages under `optionalDependencies` pinned to the exact
#     version. Sub-packages are `npm-packages/mnem-cli-<plat>-<arch>/`
#     for {win32-x64, linux-x64, linux-arm64, darwin-arm64}. Each
#     sub-package's `bin/` and `lib/` are tracked with `.gitkeep` and
#     populated inside the `binaries` arm before publishing.
#   - Publish order is strict: `publish-npm-subpackages` (matrix) must
#     finish FIRST, then `publish-npm-umbrella` runs LAST. This way an
#     end-user `npm install mnem-cli` never resolves the umbrella's
#     optionalDependencies to versions that have not been published yet.
# -----------------------------------------------------------------------------

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.5)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Test (workspace)
        run: cargo test --workspace --tests --lib

      # Clippy on the release path: the CI workflow runs it on PRs,
      # but re-running at release time catches warnings that snuck in
      # via a direct push to main.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  release:
    name: create GitHub release
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine release version from tag"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Release: $TAG (prerelease: $([[ "$VERSION" == *-* ]] && echo true || echo false))"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: mnem ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}

  # Build and upload release archives for every (triple) the install
  # scripts download. Archive name is `mnem-<triple>.tar.gz` (Unix) or
  # `mnem-<triple>.zip` (Windows); contents are bare binaries at the
  # archive root: `mnem` (unified binary with mcp/http subcommands).
  binaries:
    name: binaries (${{ matrix.triple }})
    needs: release
    runs-on: ${{ matrix.runner }}
    # cross-rs pulls a ~1GB docker image on first run; pad generously
    # so an arm64 first-run doesn't get killed by the default 6h cap.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            use_cross: false
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz'
            ort_lib_glob: 'libonnxruntime.so.1.20.1'
            npm_pkg: mnem-cli-linux-x64
            py_plat_tag: 'manylinux_2_17_x86_64.manylinux2014_x86_64'
          # aarch64 Linux via cross-rs so we don't have to maintain a
          # self-hosted arm runner. Docker-based cross uses a
          # manylinux-compatible toolchain so the wheel works on
          # Debian/Ubuntu/Amazon Linux 2+.
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            use_cross: true
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-aarch64-1.20.1.tgz'
            ort_lib_glob: 'libonnxruntime.so.1.20.1'
            npm_pkg: mnem-cli-linux-arm64
            py_plat_tag: 'manylinux_2_17_aarch64.manylinux2014_aarch64'
          # x86_64-apple-darwin dropped: macos-13 runners have near-zero
          # availability on GitHub's free tier. Intel Mac users can
          # cargo install or use the aarch64 binary via Rosetta 2.
          - triple: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            use_cross: false
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-osx-arm64-1.20.1.tgz'
            ort_lib_glob: 'libonnxruntime.1.20.1.dylib'
            npm_pkg: mnem-cli-darwin-arm64
            py_plat_tag: 'macosx_11_0_arm64'
          - triple: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            use_cross: false
            ort_url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip'
            ort_lib_glob: 'onnxruntime.dll'
            npm_pkg: mnem-cli-win32-x64
            py_plat_tag: 'win_amd64'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.95 (${{ matrix.triple }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from tag
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"

      - name: Install cross (aarch64-linux only)
        if: matrix.use_cross
        run: cargo install cross --locked --version 0.2.5

      # cargo-auditable embeds a deterministic SBOM into every release
      # binary via a `.dep-v0` ELF / Mach-O / PE section. The section
      # contents are a sorted + gzipped view of Cargo.lock, so same
      # lockfile == same bytes (reproducible-build friendly). Consumers
      # can run `cargo audit bin mnem` on a shipped archive to get the
      # same vuln report they'd get against the source tree.
      - name: Install cargo-auditable
        if: ${{ !matrix.use_cross }}
        run: cargo install cargo-auditable --locked --version 0.6.7

      # SOURCE_DATE_EPOCH + --remap-path-prefix make the binaries
      # reproducible given the same toolchain + lockfile. The
      # `reproducibility.yml` workflow independently asserts this with
      # a dual-build diff on Linux-musl.
      - name: Set SOURCE_DATE_EPOCH
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct HEAD)" >> "$GITHUB_ENV"

      # Build the unified mnem binary with bundled-embedder. After the
      # v0.2.0 merge, `mnem mcp serve` and `mnem http serve` are
      # subcommands inside this single binary. The bundled-embedder
      # forwards to mnem-embed-providers/onnx-bundled so dense
      # retrieval works out of the box (no Ollama needed).
      - name: Build release binary (mnem-cli)
        if: ${{ !matrix.use_cross }}
        env:
          RUSTFLAGS: "-C strip=debuginfo --remap-path-prefix=${{ github.workspace }}=."
        run: >
          cargo auditable build --release --locked
          --target ${{ matrix.triple }}
          -p mnem-cli --features bundled-embedder

      - name: Build release binary (cross, mnem-cli)
        if: matrix.use_cross
        env:
          RUSTFLAGS: "-C strip=debuginfo --remap-path-prefix=${{ github.workspace }}=."
        run: >
          cross build --release --locked
          --target ${{ matrix.triple }}
          -p mnem-cli --no-default-features --features onnx

      # Download platform-specific onnxruntime and stage the dynamic
      # library under `lib/` in the archive so users can run
      # `mnem-http` out of the box. ort's load-dynamic mode resolves the
      # `mnem http serve` (subcommand inside the unified mnem binary)
      # out of the box. ort's load-dynamic mode resolves the library
      # via ORT_DYLIB_PATH or platform default search paths; the
      # bundled README install snippet documents how to point it at
      # the sibling lib/ directory.
      - name: Download onnxruntime (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ort-extract
          curl -fsSL "${{ matrix.ort_url }}" -o ort.tgz
          tar xzf ort.tgz -C ort-extract --strip-components=1
          ls -la ort-extract/lib

      - name: Download onnxruntime (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path ort-extract | Out-Null
          Invoke-WebRequest -Uri "${{ matrix.ort_url }}" -OutFile ort.zip
          Expand-Archive -Path ort.zip -DestinationPath ort-tmp -Force
          # Microsoft ships ort zips with a single top-level dir; flatten.
          $inner = Get-ChildItem -Directory ort-tmp | Select-Object -First 1
          Move-Item "$($inner.FullName)\*" ort-extract\
          Get-ChildItem ort-extract\lib

      - name: Pack archive + checksum (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          NAME="mnem-${{ matrix.triple }}"
          DIR="target/${{ matrix.triple }}/release"
          mkdir -p "dist/$NAME/bin" "dist/$NAME/lib"
          # After v0.2.0: the unified `mnem` binary exposes `mcp serve`
          # and `http serve` as subcommands. Ship only `mnem` in the
          # prebuilt archive; users who need the HTTP server run
          # `mnem http serve` with the same binary.
          cp "$DIR/mnem" "dist/$NAME/bin/"
          # Bundle libonnxruntime so `mnem http serve` (subcommand inside
          # the unified binary) can resolve it via ort's load-dynamic
          # mode at runtime.
          cp "ort-extract/lib/${{ matrix.ort_lib_glob }}" "dist/$NAME/lib/"
          # Drop README + LICENSE at archive root for discoverability.
          cp README.md LICENSE "dist/$NAME/" 2>/dev/null || cp README.md "dist/$NAME/"
          # Install snippet for the unified binary. `mnem http serve`
          # is a subcommand inside the same binary; no separate archive.
          cat > "dist/$NAME/INSTALL.md" <<'EOF'
          # Install (prebuilt mnem)

          Extract this archive, then run the CLI:

          ```bash
          tar xzf mnem-<version>-<triple>.tar.gz
          cd mnem-<triple>
          ./bin/mnem --version      # CLI
          ./bin/mnem mcp serve     # MCP server (stdio)
          ./bin/mnem http serve    # HTTP API server
          ```

          For HTTP server use, point `ORT_DYLIB_PATH` at the bundled
          onnxruntime:

          ```bash
          export ORT_DYLIB_PATH="$(pwd)/lib/${{ matrix.ort_lib_glob }}"
          ./bin/mnem http serve
          ```
          EOF
          tar czf "dist/$NAME.tar.gz" -C dist "$NAME"
          # SHA-256 alongside the archive so Homebrew / Scoop / the
          # install.sh checker have an authoritative hash. The
          # `shasum -a 256` form works on both macOS and Linux;
          # GitHub's Ubuntu image has coreutils sha256sum and BSD
          # shasum both. Use `shasum -a 256` for portability.
          (cd dist && shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256")
          ls -la dist

      - name: Pack archive + checksum (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Name = "mnem-${{ matrix.triple }}"
          $Dir  = "target/${{ matrix.triple }}/release"
          New-Item -ItemType Directory -Force -Path "dist/$Name/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "dist/$Name/lib" | Out-Null
          foreach ($bin in @('mnem.exe')) {
              Copy-Item -Path "$Dir/$bin" -Destination "dist/$Name/bin/" -Force
          }
          # Bundle onnxruntime.dll for `mnem http serve` (subcommand inside
          # the unified mnem.exe; uses the onnx features via bundled-embedder).
          Copy-Item -Path "ort-extract/lib/${{ matrix.ort_lib_glob }}" -Destination "dist/$Name/lib/" -Force
          Copy-Item -Path "README.md" -Destination "dist/$Name/" -Force
          if (Test-Path "LICENSE") { Copy-Item -Path "LICENSE" -Destination "dist/$Name/" -Force }
          # Install snippet for the unified binary. After the v0.2.0 merge,
          # `mnem http serve` is a subcommand inside the same mnem.exe.
          $install = @"
          # Install (prebuilt mnem)

          Extract this archive, then run the CLI:

          ``````powershell
          Expand-Archive mnem-<version>-x86_64-pc-windows-msvc.zip
          cd mnem-x86_64-pc-windows-msvc
          .\bin\mnem.exe --version      # CLI
          .\bin\mnem.exe mcp serve     # MCP server (stdio)
          .\bin\mnem.exe http serve    # HTTP API server
          ``````

          For HTTP server use, set ``ORT_DYLIB_PATH`` to the bundled
          onnxruntime DLL:

          ``````powershell
          `$env:ORT_DYLIB_PATH = "`$PWD\lib\onnxruntime.dll"
          .\bin\mnem.exe http serve
          ``````
          "@
          Set-Content -Path "dist/$Name/INSTALL.md" -Value $install -Encoding utf8
          Compress-Archive -Path "dist/$Name/*" -DestinationPath "dist/$Name.zip" -Force
          # Emit checksum in the same two-column `<hash>  <file>`
          # format `shasum -a 256` uses so mixed-OS consumers can
          # parse uniformly.
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$Name.zip").Hash.ToLower()
          "$hash  $Name.zip" | Out-File -FilePath "dist/$Name.zip.sha256" -Encoding ASCII -NoNewline
          Get-ChildItem dist

      - name: Upload archive + checksum to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            dist/mnem-${{ matrix.triple }}.${{ matrix.archive }}
            dist/mnem-${{ matrix.triple }}.${{ matrix.archive }}.sha256
          prerelease: ${{ needs.release.outputs.prerelease == 'true' }}

      # ---------------------------------------------------------------
      # Stage the just-built native binary + onnxruntime into the npm
      # sub-package directory for this triple. Sub-package layout is
      # `npm-packages/<npm_pkg>/{bin,lib}/`; only `.gitkeep` lives there
      # in source control. The sub-package is then tarred for transport
      # to the publish-npm-subpackages job.
      # ---------------------------------------------------------------
      - name: Stage npm sub-package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          NPM_DIR="npm-packages/${{ matrix.npm_pkg }}"
          NAME="mnem-${{ matrix.triple }}"
          mkdir -p "$NPM_DIR/bin" "$NPM_DIR/lib"
          cp "dist/$NAME/bin/mnem" "$NPM_DIR/bin/"
          cp "dist/$NAME/lib/${{ matrix.ort_lib_glob }}" "$NPM_DIR/lib/"
          ls -la "$NPM_DIR/bin" "$NPM_DIR/lib"

      # Intel Mac users get the aarch64 binary via the same staging path;
      # macOS Rosetta 2 transparently translates arm64 -> x86_64. Without
      # this, `npm install` on an Intel Mac resolves zero optionalDeps
      # and the umbrella fires the "unsupported platform" message even
      # though we *do* have a runnable binary.
      - name: Stage npm darwin-x64 (Rosetta fallback)
        if: matrix.triple == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          NPM_DIR="npm-packages/mnem-cli-darwin-x64"
          NAME="mnem-${{ matrix.triple }}"
          mkdir -p "$NPM_DIR/bin" "$NPM_DIR/lib"
          cp "dist/$NAME/bin/mnem" "$NPM_DIR/bin/"
          cp "dist/$NAME/lib/${{ matrix.ort_lib_glob }}" "$NPM_DIR/lib/"
          ls -la "$NPM_DIR/bin" "$NPM_DIR/lib"

      - name: Stage npm sub-package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $NpmDir = "npm-packages/${{ matrix.npm_pkg }}"
          $Name   = "mnem-${{ matrix.triple }}"
          New-Item -ItemType Directory -Force -Path "$NpmDir/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$NpmDir/lib" | Out-Null
          Copy-Item -Path "dist/$Name/bin/mnem.exe" -Destination "$NpmDir/bin/" -Force
          Copy-Item -Path "dist/$Name/lib/${{ matrix.ort_lib_glob }}" -Destination "$NpmDir/lib/" -Force
          Get-ChildItem "$NpmDir/bin", "$NpmDir/lib"

      # ---------------------------------------------------------------
      # Stage the same payload into py-packages/mnem-cli/mnem_cli/_vendor/
      # and run `python -m build --wheel` with MNEM_CLI_PLAT_TAG set so
      # the hatchling custom hook (hatch_build.py) tags the wheel
      # platform-specifically (e.g. `mnem_cli-<v>-py3-none-<plat>.whl`).
      # ---------------------------------------------------------------
      - name: Stage pip _vendor + build wheel (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          MNEM_CLI_PLAT_TAG: ${{ matrix.py_plat_tag }}
        run: |
          set -euo pipefail
          VENDOR="py-packages/mnem-cli/mnem_cli/_vendor"
          NAME="mnem-${{ matrix.triple }}"
          mkdir -p "$VENDOR/bin" "$VENDOR/lib"
          cp "dist/$NAME/bin/mnem" "$VENDOR/bin/"
          cp "dist/$NAME/lib/${{ matrix.ort_lib_glob }}" "$VENDOR/lib/"
          python -m pip install --upgrade pip
          python -m pip install build hatchling
          ( cd py-packages/mnem-cli && python -m build --wheel )
          ls -la py-packages/mnem-cli/dist/

      - name: Stage pip _vendor + build wheel (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          MNEM_CLI_PLAT_TAG: ${{ matrix.py_plat_tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $Vendor = "py-packages/mnem-cli/mnem_cli/_vendor"
          $Name   = "mnem-${{ matrix.triple }}"
          New-Item -ItemType Directory -Force -Path "$Vendor/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$Vendor/lib" | Out-Null
          Copy-Item -Path "dist/$Name/bin/mnem.exe" -Destination "$Vendor/bin/" -Force
          Copy-Item -Path "dist/$Name/lib/${{ matrix.ort_lib_glob }}" -Destination "$Vendor/lib/" -Force
          python -m pip install --upgrade pip
          python -m pip install build hatchling
          Push-Location py-packages/mnem-cli
          python -m build --wheel
          Pop-Location
          Get-ChildItem py-packages/mnem-cli/dist/

      # ---------------------------------------------------------------
      # Per-triple artifacts handed off to the publish jobs:
      #   - cli-npm-<triple>:   the fully staged sub-package directory
      #   - cli-wheel-<triple>: the built wheel ONLY (no sdist; that is
      #                         built once inside publish-pypi)
      # ---------------------------------------------------------------
      - name: Upload npm sub-package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-npm-${{ matrix.triple }}
          path: npm-packages/${{ matrix.npm_pkg }}/
          if-no-files-found: error
          retention-days: 7

      # Companion to the Rosetta-fallback staging above: ship the
      # darwin-x64 sub-package as its own artifact so the
      # publish-npm-subpackages matrix can pick it up under the
      # standard `cli-npm-<key>` naming scheme. Key is
      # `aarch64-apple-darwin-x64` to avoid colliding with the real
      # aarch64-apple-darwin artifact.
      - name: Upload darwin-x64 (Rosetta fallback) artifact
        if: matrix.triple == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: cli-npm-aarch64-apple-darwin-x64
          path: npm-packages/mnem-cli-darwin-x64/
          if-no-files-found: error
          retention-days: 7

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-wheel-${{ matrix.triple }}
          path: py-packages/mnem-cli/dist/*.whl
          if-no-files-found: error
          retention-days: 7

  # -----------------------------------------------------------------
  # SLSA v1.0 build-provenance. Reuses the SLSA framework's generic
  # generator (pinned to @v2.0.0 via release-slsa.yml) to mint an
  # in-toto attestation over every per-triple archive the `binaries`
  # job just uploaded. The attestation lands as `<archive>.intoto.jsonl`
  # on the same release, so users run
  #   slsa-verifier verify-artifact \
  #     --provenance-path <.jsonl> \
  #     --source-uri github.com/Uranid/mnem \
  #     <archive>
  # to prove the archive came from this workflow at this commit.
  #
  # Pulled out to its own workflow file (`release-slsa.yml`) because
  # SLSA's reusable generator MUST be referenced as a top-level
  # `uses:` job, which rules out nesting it inside an existing job.
  # -----------------------------------------------------------------
  attest-slsa:
    name: SLSA v1.0 provenance
    needs: [release, binaries]
    if: always() && needs.release.result == 'success' && needs.binaries.result == 'success'
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: ./.github/workflows/release-slsa.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      prerelease: ${{ needs.release.outputs.prerelease }}

  # -----------------------------------------------------------------
  # Cosign keyless signing (Sigstore). Signs every per-triple archive
  # using the workflow's OIDC token -> Fulcio cert chain, so no
  # long-lived keys are stored. Emits `<file>.sig` + `<file>.pem`
  # (Fulcio cert) alongside each archive on the GitHub release.
  #
  # Consumer verification:
  #   cosign verify-blob \
  #     --certificate mnem-<triple>.tar.gz.pem \
  #     --signature   mnem-<triple>.tar.gz.sig \
  #     --certificate-identity-regexp \
  #       "https://github.com/Uranid/mnem/.github/workflows/release.yml@refs/tags/v.*" \
  #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
  #     mnem-<triple>.tar.gz
  # -----------------------------------------------------------------
  sign-artifacts:
    name: cosign sign release archives
    needs: [release, binaries]
    if: always() && needs.release.result == 'success' && needs.binaries.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write   # mint OIDC token for keyless Fulcio cert
      contents: write   # upload .sig + .pem back to the release
    steps:
      - uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin deliberately for supply-chain hygiene. Bump after
          # reviewing https://github.com/sigstore/cosign/releases .
          cosign-release: "v2.4.1"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist \
            --pattern 'mnem-*.tar.gz' \
            --pattern 'mnem-*.zip' \
            --pattern 'mnem-*.sha256'
          ls -la dist

      - name: Sign each archive (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd dist
          for f in mnem-*.tar.gz mnem-*.zip; do
            [ -f "$f" ] || continue
            echo ">> cosign sign-blob $f"
            cosign sign-blob --yes \
              --output-signature   "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done
          ls -la

      - name: Upload signatures + certs to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            dist/mnem-*.tar.gz.sig
            dist/mnem-*.tar.gz.pem
            dist/mnem-*.zip.sig
            dist/mnem-*.zip.pem
          prerelease: ${{ needs.release.outputs.prerelease == 'true' }}

  # Publish Rust crates to crates.io in dependency order. Uses
  # `cargo publish --no-verify` per crate to avoid rebuilding in the
  # registry sandbox (we already tested above). Skip any crate whose
  # version is already on crates.io so re-running the workflow after a
  # partial publish is idempotent.
  #
  # Requires:
  #   - `CARGO_REGISTRY_TOKEN` repo secret with publish rights.
  publish-crates:
    name: publish crates.io
    needs: [release, test]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    # 16 crates * 10min sleep (crates.io new-crate rate limit) =
    # ~160 minutes worst-case on a cold-publish run. Already-published
    # crates skip fast on re-runs. Budget 3h.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from tag
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Leaves (no internal deps) first; then libs that depend on them.
          # Topo-ordered: deps before dependents. cargo publish requires
          # each crate's deps to already be on crates.io.
          # mnem-mcp and
          # mnem-http as library crates (they remain workspace members and
          # are required by other crates), but the GitHub release archives
          # ship only the unified `mnem` binary (which contains both as
          # subcommands). Users who `cargo install mnem-mcp` or
          # `cargo install mnem-http` still work as before.
          # Topo-ordered: deps before dependents. mnem-ingest depends on
          # mnem-extract via its `keybert` feature (optional prod dep), so
          # extract must publish first. mnem-extract's reverse mention of
          # mnem-ingest is dev-only and overridden to path-only at the
          # crate level so it gets stripped from the published manifest.
          CRATES=(
            mnem-core
            mnem-ann
            mnem-backend-redb
            mnem-embed-providers
            mnem-sparse-providers
            mnem-rerank-providers
            mnem-llm-providers
            mnem-ner-providers
            mnem-transport
            mnem-graphrag
            mnem-extract
            mnem-ingest
            mnem-bench
            mnem-http
            mnem-mcp
            mnem-cli
          )
          # crates.io new-crate rate limit is a token bucket: ~6 burst,
          # then 1 token per 10 minutes. Short sleep on success to stay
          # under the burst, fall back to 10m wait only when 429 hit.
          for c in "${CRATES[@]}"; do
            VERSION=$(cargo pkgid -p "$c" | sed 's/.*#//')
            echo "publish $c@$VERSION"
            attempt=0
            while :; do
              if cargo publish --no-verify --locked -p "$c" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee /tmp/pub.log; then
                echo "published $c@$VERSION"
                sleep 30
                break
              elif grep -q "already exists" /tmp/pub.log; then
                echo "skip $c@$VERSION already on crates.io"
                break
              elif grep -q "Too Many Requests" /tmp/pub.log && [ $attempt -lt 8 ]; then
                attempt=$((attempt+1))
                echo "rate limited (attempt $attempt/8); sleeping 600s"
                sleep 600
              else
                echo "publish failed for $c@$VERSION" >&2
                cat /tmp/pub.log >&2
                exit 1
              fi
            done
          done

  # Build + upload the Python wheel to PyPI for the `mnem-py` compiled
  # pyo3 extension (separate distribution from `mnem-cli`).
  # maturin-action runs a manylinux2014 Docker image (Linux), native
  # toolchain (macOS + Windows). abi3-py39 means one wheel per (triple)
  # works for 3.9 through 3.13.
  #
  # Requires either:
  #   - PyPI "Trusted Publisher" configured for this repo + environment `pypi`, OR
  #   - `PYPI_API_TOKEN` repo secret (fallback)
  publish-pypi-mnem-py:
    name: build PyPI mnem-py (${{ matrix.triple }})
    needs: [release, test]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: "2014"
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: "2014"
          # x86_64-apple-darwin dropped: macos-13 runner unavailability.
          - triple: aarch64-apple-darwin
            runner: macos-latest
            manylinux: "auto"
          - triple: x86_64-pc-windows-msvc
            runner: windows-latest
            manylinux: "auto"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from Cargo.toml
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.triple }}
          args: --release --strip --manifest-path crates/mnem-py/Cargo.toml
          manylinux: ${{ matrix.manylinux }}
          sccache: "true"
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnem-py-wheel-${{ matrix.triple }}
          path: target/wheels/*.whl
          if-no-files-found: error
          retention-days: 7

  publish-pypi-mnem-py-upload:
    name: upload mnem-py wheels to PyPI
    needs: [release, publish-pypi-mnem-py]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: mnem-py-wheel-*
          merge-multiple: true
      - name: Publish to PyPI (Trusted Publisher / OIDC)
        # Auth via PyPI Trusted Publisher (OIDC). No password / token
        # required: pypa/gh-action-pypi-publish exchanges the workflow
        # OIDC token for a short-lived publish credential. Configure
        # the project on PyPI: Account Settings -> Publishing ->
        # owner=Uranid, repo=mnem, workflow=release.yml, environment=production.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # -----------------------------------------------------------------
  # publish-pypi (mnem-cli)
  #
  # New post-refactor flow: the `binaries` matrix already built one
  # per-platform wheel for `mnem-cli` per triple, each tagged via
  # `MNEM_CLI_PLAT_TAG` so hatchling emits e.g.
  #   mnem_cli-<v>-py3-none-win_amd64.whl
  #   mnem_cli-<v>-py3-none-macosx_11_0_arm64.whl
  #   mnem_cli-<v>-py3-none-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
  #   mnem_cli-<v>-py3-none-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
  # This job downloads all four, also builds the sdist (no embedded
  # binary; serves as helpful-error fallback for `pip install` on an
  # unsupported platform), and uploads everything together via PyPI
  # Trusted Publisher (OIDC).
  # -----------------------------------------------------------------
  publish-pypi:
    name: publish PyPI (mnem-cli)
    needs: [release, binaries]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from tag
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"

      - name: Download per-triple cli wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-wheel-*
          merge-multiple: true

      - name: Build sdist (no embedded binary; helpful-error fallback)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install build hatchling
          ( cd py-packages/mnem-cli && python -m build --sdist --outdir ../../dist/ )
          ls -la dist/

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        # Auth via PyPI Trusted Publisher (OIDC). No password / token
        # required: pypa/gh-action-pypi-publish exchanges the workflow
        # OIDC token for a short-lived publish credential. Configure
        # the project on PyPI: Account Settings -> Publishing ->
        # owner=Uranid, repo=mnem, workflow=release.yml, environment=production.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # -----------------------------------------------------------------
  # Multi-arch Docker image published to both GitHub Container Registry
  # (always) and Docker Hub (when DOCKERHUB_USERNAME / DOCKERHUB_TOKEN
  # secrets are set). Tags: `<version>`, `<major>.<minor>`, `latest`.
  # Image runs `mnem http serve` (subcommand inside the unified `mnem`
  # binary) with bundled-embedder so the hybrid pipeline works out of
  # the box inside the container.
  # -----------------------------------------------------------------
  publish-docker:
    name: publish Docker (GHCR + Docker Hub)
    needs: [release, test]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    # linux/amd64 only: ARM64 via QEMU took 3h+ and hit timeout every
    # cold-cache run. ARM64 users pull the amd64 image via Rosetta 2 /
    # Docker's --platform flag. Native ARM64 image can be re-added when
    # a self-hosted arm64 runner or GitHub's arm64 runners are available.
    timeout-minutes: 240
    # Job-level env so `if: env.DOCKERHUB_USERNAME != ''` on downstream
    # steps evaluates BEFORE the step runs (step-level env isn't in
    # scope for its own `if:` guard - a subtle GHA gotcha).
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
    permissions:
      contents: read
      packages: write
      id-token: write   # mint OIDC token for cosign keyless signing via Fulcio
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from tag
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"
      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub (if configured)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        env:
          VERSION: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          # Strip the leading "v": v0.1.0 -> 0.1.0
          V="${VERSION#v}"
          # Major.Minor: 0.1.0 -> 0.1
          MM="$(echo "$V" | cut -d. -f1,2)"
          # GHCR + Docker Hub require lowercase repo names. github.repository_owner
          # preserves the user-set case (e.g. `Uranid`), so we down-case here.
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          TAGS="ghcr.io/${OWNER_LC}/mnem:$V"
          TAGS="$TAGS,ghcr.io/${OWNER_LC}/mnem:$MM"
          TAGS="$TAGS,ghcr.io/${OWNER_LC}/mnem:latest"
          if [ -n "${DOCKERHUB_USERNAME:-}" ]; then
            TAGS="$TAGS,docker.io/${DOCKERHUB_USERNAME}/mnem:$V"
            TAGS="$TAGS,docker.io/${DOCKERHUB_USERNAME}/mnem:$MM"
            TAGS="$TAGS,docker.io/${DOCKERHUB_USERNAME}/mnem:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Image tags: $TAGS"
      - name: Build + push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          # onnx feature in the image so `sparse.provider = "onnx"`
          # works inside the container without a custom build.
          build-args: |
            FEATURES=onnx
            VERSION=${{ needs.release.outputs.tag }}
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install cosign + sign the just-pushed image. Keyless OIDC ->
      # Fulcio cert; signature lands in the registry at
      # `<ref>@<digest>.sig` (cosign's native convention) so
      # `cosign verify ghcr.io/.../mnem:<version>` works out of the box.
      # Signing every tag is anchored to the manifest-list digest
      # (not the mutable tag), so tag rewrites never invalidate an
      # existing signature.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: cosign sign image (GHCR + optional Docker Hub)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          IFS=',' read -ra TAG_LIST <<< "$TAGS"
          for tag in "${TAG_LIST[@]}"; do
            ref="${tag}@${DIGEST}"
            echo ">> cosign sign $ref"
            cosign sign --yes "$ref"
          done

  # -----------------------------------------------------------------
  # Homebrew tap bump. Assumes a separate `homebrew-mnem` repo owned
  # by `Uranid` exists (see docs/RELEASE.md for the one-off
  # bootstrap). The action computes SHA-256 of the macOS + Linux
  # archives, bumps the formula's `version` / `sha256` fields, and
  # opens a PR (or commits directly) against the tap.
  # -----------------------------------------------------------------
  publish-homebrew:
    name: bump Homebrew formula
    needs: [release, binaries]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Bump mnem formula in Uranid/homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          # Personal-access token with `public_repo` scope on
          # Uranid/homebrew-tap. Stored as HOMEBREW_GH_TOKEN.
          token: ${{ secrets.HOMEBREW_GH_TOKEN }}
          # No `tap:` means the action writes to homebrew-core. We keep
          # our own tap until maturity (homebrew-core wants 75+ stars +
          # 1yr + passes audit). The tap is named `homebrew-tap` (the
          # convention used by astral-sh, pola-rs, oven-sh/bun) so
          # after `brew tap uranid/tap`, users run `brew
          # install mnem` - no owner/tap qualifier.
          tap: Uranid/homebrew-tap
          formula: mnem
          tag: ${{ needs.release.outputs.tag }}
          revision: ${{ github.sha }}

  # -----------------------------------------------------------------
  # WinGet (Windows Package Manager) release PR. The action opens a PR
  # against microsoft/winget-pkgs with an updated manifest that points
  # at the Windows release archive uploaded by the `binaries` job.
  # One-off: create the initial manifest in microsoft/winget-pkgs under
  # `manifests/p/Uranid/mnem/<version>/` then enable this job.
  # -----------------------------------------------------------------
  publish-winget:
    name: open WinGet PR
    needs: [release, binaries]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: windows-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: winget-releaser
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Uranid.mnem
          max-versions-to-keep: 5
          release-tag: ${{ needs.release.outputs.tag }}
          # GitHub PAT with `public_repo` on a fork of microsoft/winget-pkgs.
          # Stored as WINGET_GITHUB_TOKEN.
          token: ${{ secrets.WINGET_GITHUB_TOKEN }}
          installers-regex: 'mnem-x86_64-pc-windows-msvc\.zip$'

  # -----------------------------------------------------------------
  # npm sub-packages (mnem-cli-<plat>-<arch>).
  #
  # Each sub-package carries the native binary + onnxruntime for one
  # triple. They are matrix-published in parallel so the umbrella job
  # can publish AFTER all four have landed on the npm registry.
  # Publish ordering is critical: if the umbrella is published while
  # any sub-package is still in flight, end users `npm install mnem-cli`
  # would resolve `optionalDependencies` against a missing version.
  #
  # Each sub-package's `bin/` + `lib/` directories were staged inside
  # the `binaries` matrix arm and uploaded as `cli-npm-<triple>`.
  # Here we download just that artifact (no checkout / no rebuild)
  # then `npm publish` from the staged directory.
  # -----------------------------------------------------------------
  publish-npm-subpackages:
    name: publish npm sub-package (${{ matrix.npm_pkg }})
    needs: [release, binaries]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing (no token needed)
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            npm_pkg: mnem-cli-linux-x64
          - triple: aarch64-unknown-linux-gnu
            npm_pkg: mnem-cli-linux-arm64
          - triple: aarch64-apple-darwin
            npm_pkg: mnem-cli-darwin-arm64
          # Intel Mac entry: the binaries job stages the aarch64-apple-
          # darwin binary into the darwin-x64 sub-package as well, so
          # Rosetta 2 picks it up at runtime. The artifact name here
          # differs from `triple` so the existing cli-npm-<triple>
          # download in the steps below still resolves correctly.
          - triple: aarch64-apple-darwin-x64
            npm_pkg: mnem-cli-darwin-x64
          - triple: x86_64-pc-windows-msvc
            npm_pkg: mnem-cli-win32-x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # OIDC publishing requires Node 22+ / npm 11.5.1+
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from tag
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"

      - name: Download staged sub-package
        uses: actions/download-artifact@v4
        with:
          name: cli-npm-${{ matrix.triple }}
          path: npm-packages/${{ matrix.npm_pkg }}/

      - name: Inspect staged sub-package
        shell: bash
        run: |
          set -euo pipefail
          ls -la "npm-packages/${{ matrix.npm_pkg }}"
          ls -la "npm-packages/${{ matrix.npm_pkg }}/bin"
          ls -la "npm-packages/${{ matrix.npm_pkg }}/lib"

      - name: Publish
        run: npm publish --access public --provenance
        working-directory: npm-packages/${{ matrix.npm_pkg }}
        # No NODE_AUTH_TOKEN - uses npm OIDC trusted publishing.
        # Requires the sub-package to exist on npmjs.com (first publish
        # is manual) and this workflow registered as a trusted publisher
        # in the npm package settings.

  # -----------------------------------------------------------------
  # npm umbrella package (mnem-cli).
  #
  # Runs LAST: depends on `publish-npm-subpackages` so all four native
  # sub-packages are already live before the umbrella's
  # `optionalDependencies` references are exposed to end users. The
  # umbrella ships only a tiny JS shim that selects the correct
  # sub-package at runtime via `process.platform` + `process.arch`.
  # -----------------------------------------------------------------
  publish-npm-umbrella:
    name: publish npm umbrella (mnem-cli)
    needs: [release, publish-npm-subpackages]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing (no token needed)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # OIDC publishing requires Node 22+ / npm 11.5.1+
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Sync versions from tag
        run: python scripts/bump-version.py "${{ needs.release.outputs.tag }}"
      - name: Publish umbrella
        run: npm publish --access public --provenance
        working-directory: npm-packages/mnem-cli
        # No NODE_AUTH_TOKEN - uses npm OIDC trusted publishing.
        # Requires `mnem-cli` to exist on npmjs.com (first publish is
        # manual) and this workflow registered as a trusted publisher
        # in the npm package settings.

  # -----------------------------------------------------------------
  # Scoop (Windows) bucket update. Assumes a separate
  # `Uranid/scoop-mnem` repo holds the manifest; this action
  # recomputes the archive hash and pushes the new version. Safe to
  # skip if the tap doesn't exist yet - the step fails loudly but the
  # rest of the release remains intact.
  # -----------------------------------------------------------------
  publish-scoop:
    name: bump Scoop manifest
    needs: [release, binaries]
    if: needs.release.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Bump mnem manifest in Uranid/scoop-mnem
        # Lightweight custom step so we don't add another third-party
        # action for a JSON-patch. Downloads the manifest, rewrites
        # version + URL + hash, commits back.
        env:
          GH_TOKEN: ${{ secrets.SCOOP_GH_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        if: env.GH_TOKEN != ''
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/mnem-x86_64-pc-windows-msvc.zip"
          # Compute sha256 of the just-released archive.
          curl -sSL -o mnem.zip "$ZIP_URL"
          SHA=$(sha256sum mnem.zip | cut -d' ' -f1)
          # Clone the manifest repo, update, push.
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Uranid/scoop-mnem.git"
          cd scoop-mnem
          jq --arg v "$VERSION" --arg url "$ZIP_URL" --arg sha "$SHA" \
            '.version = $v | .architecture["64bit"].url = $url | .architecture["64bit"].hash = $sha' \
            mnem.json > mnem.json.new
          mv mnem.json.new mnem.json
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mnem.json
          git commit -m "mnem $VERSION"
          git push
