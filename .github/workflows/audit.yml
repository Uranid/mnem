# Security audit: cargo-audit against RUSTSEC advisories.
#
# Runs on every push + PR so a CVE published between releases trips CI
# before the bad crate ships in a mnem tag. `cargo audit` walks
# `Cargo.lock` looking up each crate against
# https://rustsec.org/advisories; `--deny warnings` makes an
# unmaintained-crate or low-severity advisory fail the build, not just
# print a warning.
#
# cargo-audit is pinned to a specific version (rather than `latest`)
# so a supply-chain attack on the audit tool itself can't silently
# bypass this gate. Bump deliberately.

name: audit

on:
  push:
    branches: [main, master]
  pull_request:
  # Weekly scheduled run so dormant branches still see new advisories.
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

# Least-privilege default: read-only repo contents. cargo audit needs
# nothing else.
permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/bin
          key: cargo-audit-${{ runner.os }}-v0.22.1

      # Pinned version. When bumping, verify the release notes at
      # https://github.com/rustsec/rustsec/releases and update the
      # cache key above so the new binary is not shadowed by the old
      # cache.
      - name: Install cargo-audit (pinned)
        run: cargo install cargo-audit --locked --force --version 0.22.1

      - name: Run cargo audit
        run: cargo audit --deny warnings
