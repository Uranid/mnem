blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/Uranid/mnem/security/advisories/new
    about: Use private vulnerability reporting - do NOT open a public issue.
  - name: Question (Q&A)
    url: https://github.com/Uranid/mnem/discussions/categories/q-a
    about: "How do I ...?" - if it's not a bug and not a tightly-scoped feature proposal, ask in Discussions.
  - name: Idea or pre-proposal
    url: https://github.com/Uranid/mnem/discussions/categories/ideas
    about: Half-formed ideas, "should we consider ...", design debate - use Discussions before filing a feature issue.
  - name: Read the format specification (SPEC.md)
    url: https://github.com/Uranid/mnem/blob/main/docs/SPEC.md
    about: If your question is "how is X encoded / what does Y mean," the SPEC usually has the answer.
  - name: Read the roadmap
    url: https://github.com/Uranid/mnem/blob/main/docs/ROADMAP.md
    about: If you're asking whether feature X is coming, it's probably in here first.
